[workspace]
provider = "claude"
global_fragments = ["command-glossary", "operational-awareness"]

[[rigs]]
name = "co_store"
[rigs.imports]
[rigs.imports.gastown]
source = ".gc/system/packs/gastown"

[[rigs.patches]]
agent = "polecat"
provider = "codex"

[[rigs]]
name = "co_shipping"
prefix = "ship"
[rigs.imports]
[rigs.imports.gastown]
source = ".gc/system/packs/gastown"

[[rigs]]
name = "hello-world"
[rigs.imports]
[rigs.imports.gastown]
source = ".gc/system/packs/gastown"

[[rigs]]
name = "co_auth"
prefix = "auth"
[rigs.imports]
[rigs.imports.gastown]
source = ".gc/system/packs/gastown"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
formula_v2 = true
